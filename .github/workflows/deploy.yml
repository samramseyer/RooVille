name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build:web

      - name: Prepare GitHub Pages output
        run: cp dist/app.html dist/index.html && cp dist/app.html dist/404.html

      - name: Verify production build
        run: |
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "Build failed: dist still references source files"
            exit 1
          fi
          test -f dist/.nojekyll
          test -f dist/version.json
          test -f dist/update-check.js
          test -f dist/manifest.webmanifest
          test -f dist/favicon.svg
          grep -q 'data-build-id' dist/index.html
          grep -q 'update-check.js' dist/index.html
          grep -q '/RooVille/' dist/index.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - uses: actions/deploy-pages@v4
        id: deployment
