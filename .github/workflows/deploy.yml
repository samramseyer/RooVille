name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build:web

      - name: Prepare GitHub Pages output
        run: cp dist/app.html dist/index.html && cp dist/app.html dist/404.html

      - name: Verify production build
        run: |
          if grep -q '/src/main.tsx' dist/index.html; then
            echo "Build failed: dist still references source files"
            exit 1
          fi
          test -f dist/.nojekyll
          test -f dist/version.json
          grep -q '/RooVille/' dist/index.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
