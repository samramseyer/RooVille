<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="RooVille — build your dream coastal town. Play free in your browser or install on your phone." />
    <meta name="theme-color" content="#20B2AA" />
    <meta property="og:title" content="RooVille — Coastal Town Builder" />
    <meta property="og:description" content="Build beaches, houses, boats and zoos. Play online or install on your phone." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./icons/icon-512.png" />
    <meta name="twitter:card" content="summary" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RooVille" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <title>RooVille — Coastal Town Builder</title>
  </head>
  <body>
    <div id="root">
      <p style="padding: 2rem; font-family: system-ui, sans-serif; color: #2c3e50">Loading RooVille…</p>
    </div>
    <script>
      window.setTimeout(function () {
        var root = document.getElementById('root')
        if (!root || root.dataset.booted === '1') return
        var text = root.textContent || ''
        if (text.indexOf('Loading RooVille') === -1) return
        root.innerHTML =
          '<div style="padding:2rem;font-family:system-ui,sans-serif;max-width:520px;margin:0 auto;line-height:1.5;color:#2c3e50">' +
          '<h1 style="color:#20b2aa;margin-top:0">RooVille needs the dev server</h1>' +
          '<p>This app is built with <strong>Vite</strong>. Opening <code>index.html</code> with Live Server or by double-clicking the file will not work.</p>' +
          '<p><strong>To run the game:</strong></p>' +
          '<ol><li>Open a terminal in the RooVille folder</li>' +
          '<li>Run <code style="background:#f0f4f8;padding:2px 6px;border-radius:4px">npm run dev</code></li>' +
          '<li>Open the URL shown (usually <code style="background:#f0f4f8;padding:2px 6px;border-radius:4px">http://localhost:5173</code>)</li></ol>' +
          '<p style="color:#5d6d7e;font-size:0.9rem">If you already ran <code>npm run dev</code>, check the terminal for the port — it may be 5174 or 5175 if 5173 is in use.</p>' +
          '</div>'
      }, 3500)
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
